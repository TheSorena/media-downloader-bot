<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}پنل مدیریت{% endblock %}</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { font-family: 'Vazirmatn', 'Tahoma', sans-serif; }
    </style>
</head>
<body class="bg-gray-900 text-white min-h-screen">
    <nav class="bg-gray-800 shadow-lg">
        <div class="max-w-7xl mx-auto px-4">
            <div class="flex justify-between h-16">
                <div class="flex items-center">
                    <span class="text-xl font-bold text-blue-400">📊 پنل مدیریت</span>
                </div>
                <div class="flex items-center space-x-4 space-x-reverse">
                    <a href="/" class="text-gray-300 hover:text-white">داشبورد</a>
                    <a href="/users" class="text-gray-300 hover:text-white">کاربران</a>
                    <a href="/downloads" class="text-gray-300 hover:text-white">دانلودها</a>
                    <a href="/settings" class="text-gray-300 hover:text-white">تنظیمات</a>
                    <a href="/logout" class="text-red-400 hover:text-red-300">خروج</a>
                </div>
            </div>
        </div>
    </nav>
    <main class="max-w-7xl mx-auto py-6 px-4">
        {% block content %}{% endblock %}
    </main>
</body>
</html>
