<!DOCTYPE html>
<html lang="fa" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ورود به پنل مدیریت</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white min-h-screen flex items-center justify-center">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg w-96">
        <h1 class="text-2xl font-bold text-center mb-6">🔐 ورود به پنل</h1>
        {% if error %}
        <div class="bg-red-500/20 border border-red-500 text-red-300 px-4 py-2 rounded mb-4">
            {{ error }}
        </div>
        {% endif %}
        <form method="POST" action="/login">
            <div class="mb-4">
                <label class="block text-gray-300 mb-2">رمز عبور</label>
                <input type="password" name="password" required
                    class="w-full px-4 py-2 bg-gray-700 border border-gray-600 rounded focus:outline-none focus:border-blue-500">
            </div>
            <button type="submit"
                class="w-full bg-blue-600 hover:bg-blue-700 text-white font-bold py-2 px-4 rounded">
                ورود
            </button>
        </form>
    </div>
</body>
</html>
