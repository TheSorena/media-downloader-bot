services:
  media-bot:
    build: .
    depends_on:
      - cobalt-api
    ports:
      - "${PORT:-8000}:${PORT:-8000}"
    env_file: .env
    environment:
      - COBALT_API_URL=http://cobalt-api:9000/
    volumes:
      - bot-downloads:/app/downloads
      - bot-cookies:/app/cookies
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s

  cobalt-api:
    image: ghcr.io/imputnet/cobalt:11
    init: true
    read_only: true
    environment:
      - API_URL=http://cobalt-api:9000/
      - DURATION_LIMIT=10800
    ports:
      - "127.0.0.1:9000:9000"
    restart: unless-stopped

volumes:
  bot-downloads:
  bot-cookies:
